defaults:
  - dataset: pokemon_64
  - decoder: jit_tiny
  - _self_

num_epochs: 500
batch_size: 64
learning_rate: 1e-4
weight_decay: 0.0
warmup_epochs: 20
beta1: 0.9
beta2: 0.95
ema_decays: [0.9996, 0.9998, 0.9999]
amp_dtype: bfloat16
seed: 1999
checkpoint_dir: checkpoints
log_every: 10
sample_every: 50

# Diffusion
P_mean: -0.8
P_std: 0.8
noise_scale: 0.25
cfg_scale: 1.5
